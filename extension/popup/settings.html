<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Paramètres API</title>
  <link rel="stylesheet" href="popup.css">
  <style>
    body { width: 420px; }
    .form-group { margin: 14px 0; }
    .form-group label {
      display: block;
      font-size: 12px; font-weight: 600; color: #555;
      margin-bottom: 4px;
    }
    .form-group input[type="text"], .form-group input[type="password"] {
      width: 100%;
      padding: 7px 10px;
      font-size: 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-family: monospace;
    }
    .form-group .hint {
      font-size: 10px;
      color: #888;
      margin-top: 4px;
      line-height: 1.4;
    }
    .btn-row { display: flex; gap: 6px; margin-top: 14px; }
    .stats-box {
      margin-top: 14px;
      padding: 10px;
      background: #f0f4ff;
      border: 1px solid #c5cae9;
      border-radius: 4px;
      font-size: 11px;
      line-height: 1.5;
      display: none;
    }
    .stats-box.visible { display: block; }
    .stats-box h3 { font-size: 12px; margin-bottom: 6px; color: #1a237e; }
    .stats-box .stat-row { display: flex; justify-content: space-between; padding: 2px 0; }
  </style>
</head>
<body>
  <div class="header">
    <button id="btn-back" class="btn-back" style="color:white;background:rgba(255,255,255,.15);border:none;padding:4px 10px;border-radius:4px;cursor:pointer;margin-bottom:6px;font-size:11px">← Retour</button>
    <h1>⚙️ Paramètres API</h1>
    <p class="subtitle">Connexion à sync.judo-cattenom.fr</p>
  </div>

  <div class="section">
    <div class="form-group">
      <label for="api-token">Token API</label>
      <input type="password" id="api-token" placeholder="jcc-sync-..." autocomplete="off">
      <div class="hint">
        Token de 32+ caractères. Disponible dans <code>/home/hermes/.hermes/.env</code> sur le VPS, clé <b>HELLOASSO_API_TOKEN</b>.
      </div>
    </div>

    <div class="form-group">
      <label><input type="checkbox" id="show-token"> Afficher le token</label>
    </div>

    <div class="btn-row">
      <button id="btn-save" class="btn-primary" style="flex:none;">💾 Enregistrer</button>
      <button id="btn-test" class="btn-secondary">🔌 Tester la connexion</button>
    </div>

    <div id="status" class="status hidden"></div>

    <div id="stats-box" class="stats-box">
      <h3>📊 État de la dernière synchro</h3>
      <div id="stats-content"></div>
    </div>
  </div>

  <script src="../lib/api.js"></script>
  <script src="settings.js"></script>
</body>
</html>
