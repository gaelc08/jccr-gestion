<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JCC Saisie FFJDA</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <div class="header-top">
      <img src="logo-popup.png" alt="JCC" class="header-logo">
      <div>
        <h1>JCC Cattenom</h1>
        <p class="subtitle">Saisie licence FFJDA</p>
      </div>
      <button id="btn-settings" class="btn-icon" title="Paramètres API">⚙️</button>
    </div>
  </div>

  <div id="api-warning" class="api-warning hidden">
    ⚠️ Token API non configuré — <a href="#" id="link-config">Cliquer ici pour configurer</a>
  </div>

  <!-- Onglets mode -->
  <div class="tabs">
    <button class="tab active" data-tab="nouvelle">Nouvelle licence</button>
    <button class="tab" data-tab="renouvellement">Renouvellement</button>
  </div>

  <!-- Filtre discipline (Judo vs Iaïdo = deux clubs distincts côté fédé) -->
  <div class="discipline-filter">
    <label>Discipline :</label>
    <select id="sel-discipline">
      <option value="judo">🥋 Judo &amp; Taïso (<span id="count-judo">0</span>)</option>
      <option value="iaido">⚔️ Iaïdo / Cercle Iaïdo (<span id="count-iaido">0</span>)</option>
      <option value="all">Tous (<span id="count-all">0</span>)</option>
    </select>
    <span id="api-notice" class="discipline-notice hidden"></span>
  </div>

  <div class="section">
    <div class="select-header">
      <label>Adhérents à saisir</label>
      <div class="select-actions">
        <button id="btn-all" class="btn-link">Tout</button>
        <button id="btn-none" class="btn-link">Aucun</button>
        <span id="counter" class="counter">0 sélectionné(s)</span>
      </div>
    </div>
    <div id="adherent-list" class="adherent-list"></div>
  </div>

  <div class="progress-wrap">
    <div class="progress-label">
      <span>Progression</span>
      <span class="progress-current">0/0</span>
    </div>
    <div class="progress-bar"><div class="progress-fill"></div></div>
  </div>

  <div id="status" class="status hidden"></div>

  <div class="actions">
    <button id="btn-fill" class="btn-primary" disabled>
      ▶ Lancer la saisie
    </button>
    <button id="btn-sync" class="btn-secondary" title="Synchroniser avec HelloAsso">
      🔄
    </button>
    <button id="btn-import-helloasso" class="btn-secondary">
      📥
    </button>
    <button id="btn-load" class="btn-secondary">
      ↺
    </button>
  </div>

  <div class="footer">
    <span>Ouvrez d'abord <a href="https://moncompte.ffjudo.com/espace-club/prise-licence" target="_blank">moncompte.ffjudo.com</a></span>
  </div>

  <script src="../lib/api.js"></script>
  <script src="popup.js"></script>
</body>
</html>
